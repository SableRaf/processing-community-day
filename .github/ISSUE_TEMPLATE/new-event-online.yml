name: Online event
description: Use this template to submit a new online event to the PCD map. This template includes only the required fields and a few optional fields relevant for online events.
title: "[New Event]: "
labels:
  - New Event
  - Needs Review
body:
  - type: markdown
    attributes:
      value: |
        <!-- new-event-template -->
        Please fill out all required fields as completely as possible. Dates should use `YYYY-MM-DD`, times should use 24-hour `HH:MM`, and links should include `https://`.
  - type: input
    id: event_name
    attributes:
      label: Event name
      description: Public-facing event title as it should appear on the site.
      placeholder: PCD Online
    validations:
      required: true
  - type: input
    id: organization_name
    attributes:
      label: Organization name
      description: The organization or group responsible for organizing the event. Can be left blank if there is no specific organizing entity.
      placeholder: Something Group, University of Somewhere, etc.
    validations:
      required: false
  - type: input
    id: organization_url
    attributes:
      label: Organization website
      description: Optional — link to the organizing group's website.
      placeholder: https://example.org
    validations:
      required: false
  - type: dropdown
    id: organization_type
    attributes:
      label: Organization type
      description: Select the category that best describes the organizing group.
      options:
        - School, university, library
        - Fablab, makerspace, hackerspace
        - Museum, gallery, media arts center
        - Meetup, code club, community group
        - Nonprofit, foundation, association
        - Studio, tech company, startup
        - Other
    validations:
      required: true
  - type: input
    id: plus_code
    attributes:
      label: Full global plus code in the format XXXXXXXX+XX
      description: Required for map placement. Do not use a shortened local code. Find or verify the plus code for your event location at https://plus.codes.
      placeholder: 8FVC2222+22
    validations:
      required: true
  - type: input
    id: event_date
    attributes:
      label: Event date
      placeholder: "2026-10-17"
    validations:
      required: true
  - type: input
    id: event_end_date
    attributes:
      label: End date
      description: Only required for multi-day events. Leave blank for single-day events.
      placeholder: "2026-10-18"
    validations:
      required: false
  - type: input
    id: event_start_time
    attributes:
      label: Start time
      description: 24-hour time. Leave blank if the event is an all-day event or if the start time is not yet determined.
      placeholder: "19:00"
    validations:
      required: false
  - type: input
    id: event_end_time
    attributes:
      label: End time
      description: 24-hour time. Leave blank if the event is an all-day event or if the end time is not yet determined.
      placeholder: "21:30"
    validations:
      required: false
  - type: input
    id: event_url
    attributes:
      label: Online event URL
      description: Link where attendees can join the event (Zoom, YouTube, etc.). Can be left blank if the URL is not yet determined, but should be added as soon as possible before the event date.
      placeholder: https://zoom.us/j/example
  - type: input
    id: event_website
    attributes:
      label: Event website
      placeholder: https://example.org/pcd
    validations:
      required: false
  - type: input
    id: primary_contact_name
    attributes:
      label: Primary contact name
      description: Name of the person who can be contacted about this event.
      placeholder: Jane Doe
    validations:
      required: true
  - type: input
    id: contact_email
    attributes:
      label: Primary contact email
      description: Public contact email shown on the event page.
      placeholder: hello@example.org
    validations:
      required: true
  - type: textarea
    id: organizers
    attributes:
      label: Organizers
      description: One name per line.
      placeholder: |-
        Jane Doe
        Alex Smith
    validations:
      required: true
  - type: textarea
    id: short_description
    attributes:
      label: Short description
      description: One short summary sentence for the map popup and preview UI. If left blank, the popup will show the first few lines of the full description instead.
      placeholder: A global celebration of Processing, creative coding, and community practice.
  - type: textarea
    id: full_description
    attributes:
      label: Full event description
      description: This becomes the markdown body for the event details page. Use paragraphs, lists, and links as needed.
      placeholder: |-
        Tell visitors what the event is about, who it is for, and what to expect.
    validations:
      required: true
  - type: checkboxes
    id: event_activities
    attributes:
      label: Event activities
      description: Select all activities that apply.
      options:
        - label: Show-and-tell
        - label: Hands-on workshops
        - label: Live coding
        - label: Exhibition
        - label: Panel discussions
        - label: Beginner introductions to Processing or p5.js
        - label: Creative coding jams or hack sessions
        - label: Student project presentations
        - label: Screening
        - label: Other
  - type: input
    id: forum_thread_url
    attributes:
      label: Forum discussion URL
      description: Optional Processing forum thread with updates.
      placeholder: https://discourse.processing.org/t/pcd-worldwide-2026/48081
  - type: textarea
    id: maintainer_notes
    attributes:
      label: Additional notes
      description: Optional context for the people reviewing this submission, such as uncertainties about any of the above fields or questions about the review process. This will not appear on the event page but it will be visible in the public submission.
